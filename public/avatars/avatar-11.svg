<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Female Esthetician with Hijab -->
  <defs>
    <radialGradient id="face11" cx="0.5" cy="0.4" r="0.55"><stop offset="0%" stop-color="#fce0c4"/><stop offset="100%" stop-color="#ecc8a0"/></radialGradient>
    <radialGradient id="bgr11" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#c8f0e8"/><stop offset="100%" stop-color="#a0e0d0"/></radialGradient>
    <linearGradient id="hijab11" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#88d8c0"/><stop offset="100%" stop-color="#6cc4a8"/></linearGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bgr11)"/>

  <!-- Hijab drape -->
  <path d="M24 58 C24 78 30 100 38 120 L90 120 C98 100 104 78 104 58" fill="url(#hijab11)"/>
  <!-- Body / Pink uniform -->
  <ellipse cx="64" cy="118" rx="42" ry="24" fill="#fd79a8"/>
  <ellipse cx="64" cy="116" rx="38" ry="20" fill="#ff8cb0"/>

  <!-- Hijab head -->
  <ellipse cx="64" cy="48" rx="36" ry="36" fill="url(#hijab11)"/>
  <path d="M38 34 C48 28 80 28 90 34" stroke="#a0e8d0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hijab folds -->
  <path d="M34 56 C32 68 32 80 34 92" stroke="#58b498" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M94 56 C96 68 96 80 94 92" stroke="#58b498" stroke-width="0.8" fill="none" opacity="0.25"/>

  <!-- Face -->
  <ellipse cx="64" cy="54" rx="22" ry="24" fill="url(#face11)"/>

  <!-- Face mask pulled down on chin -->
  <path d="M46 70 C46 80 54 84 64 84 C74 84 82 80 82 70" fill="white" opacity="0.85"/>
  <path d="M46 70 Q64 66 82 70" stroke="#ddd" stroke-width="1" fill="none"/>
  <!-- Mask ear loops -->
  <path d="M46 70 C42 68 38 64 36 62" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M82 70 C86 68 90 64 92 62" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Mask fold lines -->
  <path d="M50 74 L78 74" stroke="#e0e0e0" stroke-width="0.6" fill="none"/>
  <path d="M48 78 L80 78" stroke="#e0e0e0" stroke-width="0.6" fill="none"/>

  <!-- Eyebrows -->
  <path d="M48 44 C52 40 56 40 60 43" stroke="#5a3825" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M68 43 C72 40 76 40 80 44" stroke="#5a3825" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="54" cy="52" rx="6.5" ry="6" fill="white"/>
  <circle cx="55" cy="52.5" r="4.2" fill="#5c3a1a"/>
  <circle cx="55" cy="52.5" r="2.6" fill="#0e0804"/>
  <ellipse cx="57" cy="50.5" rx="1.6" ry="1.2" fill="white" opacity="0.8"/>
  <circle cx="53.5" cy="54" r="0.7" fill="white" opacity="0.35"/>
  <path d="M47.5 50 C50 47 58 47 60.5 50" stroke="#5a3825" stroke-width="1.2" fill="none"/>

  <ellipse cx="74" cy="52" rx="6.5" ry="6" fill="white"/>
  <circle cx="75" cy="52.5" r="4.2" fill="#5c3a1a"/>
  <circle cx="75" cy="52.5" r="2.6" fill="#0e0804"/>
  <ellipse cx="77" cy="50.5" rx="1.6" ry="1.2" fill="white" opacity="0.8"/>
  <circle cx="73.5" cy="54" r="0.7" fill="white" opacity="0.35"/>
  <path d="M67.5 50 C70 47 78 47 80.5 50" stroke="#5a3825" stroke-width="1.2" fill="none"/>

  <!-- Eyelashes -->
  <path d="M47.5 49.5 L46 47.5" stroke="#5a3825" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M60.5 49.5 L62 47.5" stroke="#5a3825" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M67.5 49.5 L66 47.5" stroke="#5a3825" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M80.5 49.5 L82 47.5" stroke="#5a3825" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="64" cy="62" rx="3.5" ry="2" fill="#deb08a" opacity="0.4"/>
  <path d="M61 62 C62.5 64 65.5 64 67 62" stroke="#d0a07a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Smile (above the mask) -->
  <path d="M56 67 C60 71 68 71 72 67" stroke="#c05040" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="42" cy="60" rx="6" ry="3.5" fill="#f0a898" opacity="0.18"/>
  <ellipse cx="86" cy="60" rx="6" ry="3.5" fill="#f0a898" opacity="0.18"/>
</svg>
