<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Gulf Male with Shemagh -->
  <defs>
    <radialGradient id="face10" cx="0.5" cy="0.4" r="0.55"><stop offset="0%" stop-color="#deb08a"/><stop offset="100%" stop-color="#c89870"/></radialGradient>
    <radialGradient id="bgr10" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#c8d0e0"/><stop offset="100%" stop-color="#a0aac8"/></radialGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bgr10)"/>

  <!-- Shemagh drape behind -->
  <path d="M26 50 C26 72 30 96 38 120 L90 120 C98 96 102 72 102 50" fill="#f0ece8"/>
  <!-- Body / Thobe -->
  <ellipse cx="64" cy="118" rx="42" ry="24" fill="#f5f2ee"/>
  <ellipse cx="64" cy="116" rx="38" ry="20" fill="white"/>
  <!-- Thobe neckline -->
  <path d="M56 96 L64 100 L72 96" fill="none" stroke="#e8e4de" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Thobe center line -->
  <path d="M64 100 L64 128" stroke="#e8e4de" stroke-width="0.8" fill="none"/>

  <!-- Shemagh head wrap -->
  <ellipse cx="64" cy="44" rx="36" ry="32" fill="#f0ece8"/>
  <!-- Shemagh side drape -->
  <path d="M28 48 C26 62 26 78 28 94" stroke="#f0ece8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M100 48 C102 62 102 78 100 94" stroke="#f0ece8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Shemagh fold details -->
  <path d="M32 60 C32 74 33 86 34 96" stroke="#e0dcd6" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M96 60 C96 74 95 86 94 96" stroke="#e0dcd6" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Agal (black cord on top of shemagh) -->
  <path d="M36 36 Q64 28 92 36" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M37 40 Q64 32 91 40" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Face -->
  <ellipse cx="64" cy="54" rx="24" ry="26" fill="url(#face10)"/>

  <!-- Beard -->
  <path d="M44 62 C44 78 52 84 64 84 C76 84 84 78 84 62" fill="#1a0e06" opacity="0.5"/>
  <!-- Mustache -->
  <path d="M52 64 C56 60 60 62 64 62 C68 62 72 60 76 64" fill="#1a0e06" opacity="0.55"/>

  <!-- Eyebrows — strong -->
  <path d="M44 42 C48 37 54 37 58 41" stroke="#1a0e06" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M70 41 C74 37 80 37 84 42" stroke="#1a0e06" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="52" cy="50" rx="7" ry="6.5" fill="white"/>
  <circle cx="53" cy="50.5" r="4.5" fill="#3a2510"/>
  <circle cx="53" cy="50.5" r="2.8" fill="#0e0804"/>
  <ellipse cx="55" cy="48.5" rx="1.8" ry="1.4" fill="white" opacity="0.8"/>
  <circle cx="51.5" cy="52" r="0.8" fill="white" opacity="0.35"/>
  <path d="M45 48 C48 45 56 45 59 48" stroke="#1a0e06" stroke-width="1.2" fill="none"/>

  <ellipse cx="76" cy="50" rx="7" ry="6.5" fill="white"/>
  <circle cx="77" cy="50.5" r="4.5" fill="#3a2510"/>
  <circle cx="77" cy="50.5" r="2.8" fill="#0e0804"/>
  <ellipse cx="79" cy="48.5" rx="1.8" ry="1.4" fill="white" opacity="0.8"/>
  <circle cx="75.5" cy="52" r="0.8" fill="white" opacity="0.35"/>
  <path d="M69 48 C72 45 80 45 83 48" stroke="#1a0e06" stroke-width="1.2" fill="none"/>

  <!-- Nose -->
  <ellipse cx="64" cy="60" rx="4" ry="2.5" fill="#b88860" opacity="0.4"/>
  <path d="M60.5 60 C62 62 66 62 67.5 60" stroke="#a88050" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Smile within beard -->
  <path d="M54 68 C58 74 70 74 74 68" fill="#c05040"/>
  <path d="M54 68 C58 71 70 71 74 68" fill="white"/>
  <path d="M54 68 C58 74 70 74 74 68" fill="none" stroke="#a84030" stroke-width="0.8"/>

  <!-- Cheeks -->
  <ellipse cx="40" cy="58" rx="6" ry="3.5" fill="#d09878" opacity="0.15"/>
  <ellipse cx="88" cy="58" rx="6" ry="3.5" fill="#d09878" opacity="0.15"/>
</svg>
