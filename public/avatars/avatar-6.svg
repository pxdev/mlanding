    <radialGradient id="bgr6" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#b8e8d8"/><stop offset="100%" stop-color="#90d0b8"/></radialGradient>
    <linearGradient id="hijab6" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#5bb8a0"/><stop offset="100%" stop-color="#48a088"/></linearGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bgr6)"/>

