    <radialGradient id="bgr5" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#8898b8"/><stop offset="100%" stop-color="#6878a0"/></radialGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bgr5)"/>

