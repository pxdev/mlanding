    <radialGradient id="bgr8" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#f8c0d0"/><stop offset="100%" stop-color="#e8a0b8"/></radialGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bgr8)"/>

